<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Calistoga&display=swap"
      rel="stylesheet"
    />
    <title>Chi tiết phụ bản — Phụ bản 5</title>
    <link rel="icon" href="https://zxsj.wanmei.com/favicon.ico" />
    <link rel="stylesheet" href="table-app.css" />
    <link rel="stylesheet" href="ac-mong-10.css" />
  </head>
  <body class="excel-boss-page boss-detail-page boss-detail-page--phu-ban">
    <nav class="site-nav">
      <a href="index.html">← Trang chủ</a>
      ·
      <a href="phu-ban-5.html">← Bảng Phụ bản 5</a>
    </nav>
    <article class="boss-detail" id="detail-root">
      <h1 class="boss-detail__title" id="detail-title">Chi tiết</h1>
      <div class="boss-detail__error" id="detail-error" hidden></div>
      <div class="boss-detail__layout" id="detail-content" hidden></div>
    </article>
    <script src="phu-ban-5.js"></script>
    <script src="table-app.js"></script>
    <script src="boss-table-hotkeys.js"></script>
    <script src="boss-detail-video-popout.js"></script>
    <script>
      (function () {
        var DEFAULT_BOSS_DETAIL_VIDEO_URL =
          "https://www.youtube.com/watch?v=OY_RlbR4o4E";

        function youtubeVideoId(input) {
          var s = String(input == null ? "" : input).trim();
          if (!s) return "";
          if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
          var m = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
          if (m) return m[1];
          m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
          if (m) return m[1];
          m = s.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
          return m ? m[1] : "";
        }

        function defaultVideoEntries() {
          var y = youtubeVideoId(DEFAULT_BOSS_DETAIL_VIDEO_URL);
          return y ? [{ kind: "youtube", id: y }] : [];
        }

        var COLS = ["No.", "Mùa", "Tên phụ bản", "Boss 1", "Boss 2", "Boss 3"];

        function cellText(v) {
          if (v === null || v === undefined) return "";
          if (Array.isArray(v)) return v.join("\n");
          if (typeof v === "object") return JSON.stringify(v);
          return String(v);
        }

        /** Hiển thị tên boss: mảng 2 tên → xuống dòng; chuỗi có " / " → tách dòng */
        function bossNameForDisplay(row, key) {
          var v = row[key];
          if (v != null && Array.isArray(v)) return cellText(v);
          var s = cellText(v);
          if (!s) return "";
          return s.replace(/\s*\/\s*/g, "\n");
        }

        function bossImageSrc(path) {
          var s = String(path == null ? "" : path).trim();
          if (!s) return s;
          if (/^https?:\/\//i.test(s)) return s;
          return s
            .split("/")
            .map(function (seg) {
              return encodeURIComponent(seg);
            })
            .join("/");
        }

        /** Chiều cao tối thiểu theo tỉ lệ ảnh × width cột (ổn trên màn hẹp). */
        function applyBossImageAspect(img) {
          function set() {
            var w = img.naturalWidth;
            var h = img.naturalHeight;
            if (w > 0 && h > 0) {
              img.style.aspectRatio = w + " / " + h;
            }
          }
          if (img.complete) {
            set();
          } else {
            img.addEventListener("load", set);
          }
        }

        function findRowByDetailId(rows, wantId) {
          if (!wantId) return null;
          var idFn = window.BOSS_TABLE_PHU_BAN_DETAIL_ROW_ID;
          if (typeof idFn !== "function") return null;
          for (var i = 0; i < rows.length; i++) {
            if (idFn(rows[i]) === wantId) return rows[i];
          }
          var dec = wantId;
          try {
            dec = decodeURIComponent(wantId);
          } catch (e) {}
          if (dec !== wantId) {
            for (var j = 0; j < rows.length; j++) {
              if (idFn(rows[j]) === dec) return rows[j];
            }
          }
          return null;
        }

        var errEl = document.getElementById("detail-error");
        var titleEl = document.getElementById("detail-title");
        var contentEl = document.getElementById("detail-content");

        if (!window.BOSS_TABLE_PREPARE || !window.PHU_BAN_5_TABLE_DATA) {
          errEl.hidden = false;
          errEl.textContent = "Thiếu dữ liệu hoặc table-app.js.";
          titleEl.textContent = "Lỗi";
          return;
        }

        var prep = window.BOSS_TABLE_PREPARE(window.PHU_BAN_5_TABLE_DATA, {
          columns: COLS,
          skipBlankRows: true,
        });
        var rows = prep.rows;
        var params = new URLSearchParams(window.location.search);
        var rawId = params.get("id");
        var row = findRowByDetailId(rows, rawId);

        if (!row) {
          errEl.hidden = false;
          errEl.textContent =
            "Không tìm thấy dòng (thiếu hoặc sai tham số ?id= trong URL).";
          titleEl.textContent = "Không tìm thấy";
          document.title = "Không tìm thấy — Phụ bản 5";
          return;
        }

        contentEl.hidden = false;

        var mapName = cellText(row["Tên phụ bản"]).trim() || "Phụ bản";
        var seasonRaw = cellText(row["Mùa"]).trim();
        var titleText =
          seasonRaw !== "" ? "Mùa " + seasonRaw + " - " + mapName : mapName;
        titleEl.textContent = titleText;
        document.title = titleText + " — Phụ bản 5";

        var main = document.createElement("div");
        main.className = "boss-detail__main";

        var fieldsInner = document.createElement("div");
        fieldsInner.className =
          "boss-detail__fields-inner boss-detail__fields-inner--phu-ban";

        var bossesWrap = document.createElement("div");
        bossesWrap.className = "boss-detail__phu-bosses";

        ["Boss 1", "Boss 2", "Boss 3"].forEach(function (k) {
          var wrap = document.createElement("div");
          wrap.className = "boss-detail__field boss-detail__field--phu-boss";
          var dt = document.createElement("dt");
          dt.textContent = k;
          var dd = document.createElement("dd");
          dd.className = "boss-detail__boss-cell";
          var nameEl = document.createElement("div");
          nameEl.className = "boss-detail__pre";
          nameEl.textContent = bossNameForDisplay(row, k);
          dd.appendChild(nameEl);
          var paths = row.__bossImages && row.__bossImages[k];
          var list = Array.isArray(paths)
            ? paths.slice(0, 2)
            : paths
              ? [paths]
              : [];
          if (list.length) {
            var scroll = document.createElement("div");
            scroll.className = "boss-detail__phu-img-scroll";
            var fig = document.createElement("div");
            fig.className = "boss-detail__gallery";
            if (list.length >= 2) {
              fig.classList.add("boss-detail__gallery--phu-stack");
            } else {
              fig.classList.add("boss-detail__gallery--phu-single");
            }
            list.forEach(function (src) {
              var img = document.createElement("img");
              img.src = bossImageSrc(src);
              img.alt = bossNameForDisplay(row, k);
              img.loading = "lazy";
              applyBossImageAspect(img);
              fig.appendChild(img);
            });
            scroll.appendChild(fig);
            dd.appendChild(scroll);
          }
          wrap.appendChild(dt);
          wrap.appendChild(dd);
          bossesWrap.appendChild(wrap);
        });
        fieldsInner.appendChild(bossesWrap);

        main.appendChild(fieldsInner);

        var videos = defaultVideoEntries();
        var asideVid = document.createElement("aside");
        asideVid.className = "boss-detail__aside boss-detail__aside--videos";
        asideVid.setAttribute("aria-label", "Video phụ bản");
        var vHeading = document.createElement("h2");
        vHeading.className = "boss-detail__video-heading";
        vHeading.textContent = "Video";
        asideVid.appendChild(vHeading);
        var stack = document.createElement("div");
        stack.className = "boss-detail__video-stack";
        videos.forEach(function (entry, vi) {
          var frame = document.createElement("div");
          frame.className = "boss-detail__video-frame";
          var iframe = document.createElement("iframe");
          var q = new URLSearchParams();
          if (vi === 0) {
            q.set("autoplay", "1");
            q.set("mute", "1");
          }
          q.set("rel", "0");
          q.set("playsinline", "1");
          iframe.src =
            "https://www.youtube.com/embed/" + entry.id + "?" + q.toString();
          iframe.title =
            titleText + (videos.length > 1 ? " — video " + (vi + 1) : "");
          iframe.loading = vi === 0 ? "eager" : "lazy";
          iframe.setAttribute("allowfullscreen", "");
          iframe.allow =
            "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
          iframe.referrerPolicy = "strict-origin-when-cross-origin";
          frame.appendChild(iframe);
          stack.appendChild(frame);
        });
        asideVid.appendChild(stack);

        if (typeof window.initBossDetailVideoPopout === "function") {
          window.initBossDetailVideoPopout(asideVid);
        }

        contentEl.appendChild(main);
        contentEl.appendChild(asideVid);
      })();
    </script>
  </body>
</html>
